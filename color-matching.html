<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Color Matching! 🎨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0;padding:0;box-sizing:border-box;touch-action:manipulation; }
  body { font-family:'Nunito',sans-serif;background:#F0FFF4;min-height:100vh;overflow-x:hidden; }

header {
background:linear-gradient(135deg,#2ECC71,#1ABC9C);
padding:16px 20px 14px;
text-align:center;
box-shadow:0 4px 20px rgba(46,204,113,0.35);
}
header h1 { font-size:clamp(26px,7vw,42px);font-weight:900;color:white;text-shadow:3px 3px 0 rgba(0,0,0,0.1); }
header p { color:rgba(255,255,255,0.9);font-size:clamp(13px,3.5vw,16px);font-weight:700;margin-top:2px; }

.back-btn {
position:absolute;top:14px;left:14px;
background:rgba(255,255,255,0.25);
border:none;border-radius:50px;
padding:8px 16px;color:white;font-family:‘Nunito’,sans-serif;
font-size:14px;font-weight:800;cursor:pointer;
text-decoration:none;display:inline-block;
}

.main { max-width:500px;margin:0 auto;padding:20px 16px; }

.score-bar {
display:flex;justify-content:space-between;align-items:center;
background:white;border-radius:20px;padding:12px 20px;
margin-bottom:20px;box-shadow:0 4px 16px rgba(0,0,0,0.08);
border:3px solid #2ECC71;
}
.score-bar span { font-size:18px;font-weight:900;color:#1A5C40; }

.round-info { font-size:clamp(18px,5vw,24px);font-weight:900;color:#1A5C40;text-align:center;margin-bottom:16px; }

/* Target */
.target-area {
background:white;border-radius:28px;
border:5px solid #FFD93D;
padding:24px;text-align:center;
margin-bottom:24px;
box-shadow:0 6px 24px rgba(0,0,0,0.08);
}
.target-label { font-size:16px;font-weight:800;color:#999;margin-bottom:12px; }
.target-shape {
width:clamp(80px,25vw,120px);
height:clamp(80px,25vw,120px);
border-radius:50%;
margin:0 auto;
box-shadow:0 8px 24px rgba(0,0,0,0.2);
transition:transform 0.3s ease;
}
.target-shape.bounce { animation:bounce 0.5s ease; }
@keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

.color-name {
font-size:clamp(22px,6vw,32px);font-weight:900;margin-top:14px;
}

/* Options */
.options-label { font-size:16px;font-weight:800;color:#999;text-align:center;margin-bottom:14px; }
.options-grid {
display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:24px;
}
.option-btn {
height:clamp(70px,20vw,100px);
border-radius:24px;border:5px solid transparent;
cursor:pointer;
box-shadow:0 6px 0 rgba(0,0,0,0.15);
transition:all 0.15s ease;
position:relative;
overflow:hidden;
-webkit-tap-highlight-color:transparent;
}
.option-btn:active { transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,0.15); }
.option-btn.correct { border-color:#2ECC71;animation:correctPop 0.5s ease; }
.option-btn.wrong   { border-color:#E74C3C;animation:shake 0.4s ease; }

@keyframes correctPop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

.option-btn .tick {
position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
font-size:40px;opacity:0;transition:opacity 0.2s;
}
.option-btn.correct .tick,.option-btn.wrong .tick { opacity:1; }

.progress-bar {
background:#E0E0E0;border-radius:50px;height:14px;margin-bottom:20px;overflow:hidden;
}
.progress-fill {
background:linear-gradient(90deg,#2ECC71,#1ABC9C);
height:100%;border-radius:50px;
transition:width 0.4s ease;
}

/* End screen */
.end-screen {
display:none;background:white;border-radius:28px;
padding:36px 24px;text-align:center;
box-shadow:0 8px 32px rgba(0,0,0,0.1);
border:5px solid #2ECC71;
}
.end-screen.show { display:block; }
.end-emoji { font-size:80px;margin-bottom:12px; }
.end-title { font-size:clamp(28px,8vw,40px);font-weight:900;color:#2ECC71;margin-bottom:8px; }
.end-score { font-size:22px;font-weight:800;color:#1A5C40;margin-bottom:20px; }
.btn-restart {
background:linear-gradient(135deg,#2ECC71,#1ABC9C);
color:white;border:none;padding:16px 40px;border-radius:50px;
font-family:‘Nunito’,sans-serif;font-size:20px;font-weight:900;
cursor:pointer;box-shadow:0 5px 20px rgba(46,204,113,0.4);
}

.confetti-piece {
position:fixed;width:12px;height:12px;border-radius:2px;
animation:fall 2.5s ease-in forwards;z-index:200;pointer-events:none;
}
@keyframes fall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
</style>

</head>
<body>
<header style="position:relative">
  <a href="index.html" class="back-btn">← Back</a>
  <h1>🎨 Color Match!</h1>
  <p>Find the matching color!</p>
</header>

<div class="main">
  <div class="score-bar">
    <span>⭐ Score: <span id="scoreNum">0</span></span>
    <span>Round <span id="roundNum">1</span> / 8</span>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <div id="gameArea">
    <div class="target-area">
      <div class="target-label">Match this color! 👇</div>
      <div class="target-shape" id="targetShape"></div>
      <div class="color-name" id="colorName"></div>
    </div>

```
<div class="options-label">Tap the same color! 👆</div>
<div class="options-grid" id="optionsGrid"></div>
```

  </div>

  <div class="end-screen" id="endScreen">
    <div class="end-emoji" id="endEmoji">🎉</div>
    <div class="end-title" id="endTitle">Amazing!</div>
    <div class="end-score" id="endScore"></div>
    <button class="btn-restart" onclick="startGame()">Play Again! 🎨</button>
  </div>
</div>

<script>
const COLORS = [
  {name:'Red',    hex:'#E74C3C'},
  {name:'Blue',   hex:'#3498DB'},
  {name:'Green',  hex:'#2ECC71'},
  {name:'Yellow', hex:'#F1C40F'},
  {name:'Orange', hex:'#E67E22'},
  {name:'Pink',   hex:'#FF6B9D'},
  {name:'Purple', hex:'#9B59B6'},
  {name:'Teal',   hex:'#1ABC9C'},
];

let score = 0, round = 0, totalRounds = 8, locked = false;
const ROUNDS = 8;

function shuffle(arr) { return [...arr].sort(()=>Math.random()-0.5); }

function startGame() {
  score = 0; round = 0; locked = false;
  document.getElementById('endScreen').classList.remove('show');
  document.getElementById('gameArea').style.display = '';
  document.getElementById('scoreNum').textContent = 0;
  nextRound();
}

function nextRound() {
  if (round >= ROUNDS) { endGame(); return; }
  round++;
  locked = false;
  document.getElementById('roundNum').textContent = round;
  document.getElementById('progressFill').style.width = ((round-1)/ROUNDS*100)+'%';

  const target = COLORS[Math.floor(Math.random()*COLORS.length)];
  document.getElementById('targetShape').style.background = target.hex;
  document.getElementById('colorName').textContent = target.name;
  document.getElementById('colorName').style.color = target.hex;

  // 4 options: correct + 3 random
  const others = shuffle(COLORS.filter(c=>c.hex!==target.hex)).slice(0,3);
  const options = shuffle([target,...others]);

  const grid = document.getElementById('optionsGrid');
  grid.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.style.background = opt.hex;
    btn.innerHTML = '<div class="tick"></div>';
    btn.addEventListener('click', () => handleAnswer(btn, opt.hex === target.hex));
    grid.appendChild(btn);
  });
}

function handleAnswer(btn, correct) {
  if (locked) return;
  locked = true;
  if (correct) {
    btn.classList.add('correct');
    btn.querySelector('.tick').textContent = '✓';
    score++;
    document.getElementById('scoreNum').textContent = score;
    document.getElementById('targetShape').classList.add('bounce');
    setTimeout(()=>document.getElementById('targetShape').classList.remove('bounce'),500);
  } else {
    btn.classList.add('wrong');
    btn.querySelector('.tick').textContent = '✗';
    // highlight correct
    document.querySelectorAll('.option-btn').forEach(b=>{
      if (b.style.background === document.getElementById('targetShape').style.background && b !== btn) {
        b.classList.add('correct');
        b.querySelector('.tick').textContent = '✓';
      }
    });
  }
  setTimeout(nextRound, 1000);
}

function endGame() {
  document.getElementById('gameArea').style.display = 'none';
  document.getElementById('progressFill').style.width = '100%';
  const pct = Math.round(score/ROUNDS*100);
  let emoji, title;
  if (pct >= 88)      { emoji='🏆'; title='Color Master!'; }
  else if (pct >= 63) { emoji='🌟'; title='Great Job!'; }
  else if (pct >= 38) { emoji='😊'; title='Good Try!'; }
  else                { emoji='💪'; title='Keep Practicing!'; }
  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScore').textContent = `You got ${score} out of ${ROUNDS} correct! (${pct}%)`;
  document.getElementById('endScreen').classList.add('show');
  if (pct >= 63) confetti();
}

function confetti() {
  const colors=['#2ECC71','#1ABC9C','#FFD93D','#FF6B9D','#3498DB','#9B59B6'];
  for(let i=0;i<50;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti-piece';
      el.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*1.5}s;animation-delay:${Math.random()*0.5}s;transform:rotate(${Math.random()*360}deg)`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),3500);
    },i*40);
  }
}

startGame();
</script>

</body>
</html>
