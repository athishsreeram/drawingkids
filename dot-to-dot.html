<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dot to Dot! ✏️</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation;}
  body{font-family:'Nunito',sans-serif;background:#F0F4FF;min-height:100vh;}

header{background:linear-gradient(135deg,#5DADE2,#9B59B6);padding:16px 20px 14px;text-align:center;box-shadow:0 4px 20px rgba(93,173,226,0.35);position:relative;}
header h1{font-size:clamp(26px,7vw,42px);font-weight:900;color:white;text-shadow:3px 3px 0 rgba(0,0,0,0.1);}
header p{color:rgba(255,255,255,0.9);font-size:clamp(13px,3.5vw,16px);font-weight:700;margin-top:2px;}
.back-btn{position:absolute;top:14px;left:14px;background:rgba(255,255,255,0.25);border:none;border-radius:50px;padding:8px 16px;color:white;font-family:‘Nunito’,sans-serif;font-size:14px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block;}

.main{max-width:500px;margin:0 auto;padding:20px 16px;}

.info-bar{display:flex;justify-content:space-between;align-items:center;background:white;border-radius:20px;padding:12px 20px;margin-bottom:16px;box-shadow:0 4px 16px rgba(0,0,0,0.08);border:3px solid #5DADE2;}
.info-bar span{font-size:18px;font-weight:900;color:#1A3A5C;}

.canvas-wrapper{background:white;border-radius:28px;border:5px solid #5DADE2;padding:16px;margin-bottom:16px;box-shadow:0 6px 24px rgba(0,0,0,0.08);}
.canvas-label{font-size:clamp(14px,4vw,18px);font-weight:900;color:#5DADE2;text-align:center;margin-bottom:10px;}

.canvas-container{position:relative;border-radius:18px;overflow:hidden;background:#F8FBFF;border:3px solid #D5EAF8;touch-action:none;}
#dotCanvas{display:block;width:100%;height:auto;}
.canvas-spacer{width:100%;padding-bottom:75%;display:block;}

.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.btn{padding:14px;border-radius:20px;border:none;font-family:‘Nunito’,sans-serif;font-size:clamp(14px,4vw,18px);font-weight:900;cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,0.12);-webkit-tap-highlight-color:transparent;transition:all 0.15s;}
.btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,0.12);}
.btn-clear{background:#E74C3C;color:white;}
.btn-next{background:#5DADE2;color:white;}

.shape-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
.shape-pill{background:white;border:3px solid #D5EAF8;border-radius:50px;padding:8px 16px;font-size:14px;font-weight:800;color:#5DADE2;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all 0.15s;}
.shape-pill.active{background:#5DADE2;color:white;border-color:#5DADE2;}
.shape-pill:active{transform:scale(0.95);}

.status-text{text-align:center;font-size:clamp(16px,4.5vw,22px);font-weight:900;min-height:36px;color:#5DADE2;margin-bottom:10px;}

.celebration{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;padding:20px;}
.celebration.show{display:flex;}
.cel-box{background:white;border-radius:36px;padding:40px 32px;text-align:center;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);max-width:320px;width:100%;}
@keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
.cel-emoji{font-size:80px;margin-bottom:12px;}
.cel-title{font-size:clamp(28px,8vw,40px);font-weight:900;color:#5DADE2;margin-bottom:8px;}
.cel-msg{font-size:18px;font-weight:700;color:#1A3A5C;margin-bottom:20px;}
.btn-again{background:linear-gradient(135deg,#5DADE2,#9B59B6);color:white;border:none;padding:16px 36px;border-radius:50px;font-family:‘Nunito’,sans-serif;font-size:20px;font-weight:900;cursor:pointer;}
.confetti-piece{position:fixed;width:12px;height:12px;border-radius:2px;animation:fall 2.5s ease-in forwards;z-index:200;pointer-events:none;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>

</head>
<body>
<header>
  <a href="index.html" class="back-btn">← Back</a>
  <h1>✏️ Dot to Dot!</h1>
  <p>Connect the numbers in order!</p>
</header>

<div class="main">
  <div class="info-bar">
    <span id="nextDotInfo">Tap dot: <b>1</b></span>
    <span id="progressInfo">0 / 0 connected</span>
  </div>

  <div class="shape-row" id="shapeRow">
    <button class="shape-pill active" data-shape="star">⭐ Star</button>
    <button class="shape-pill" data-shape="house">🏠 House</button>
    <button class="shape-pill" data-shape="fish">🐠 Fish</button>
    <button class="shape-pill" data-shape="rocket">🚀 Rocket</button>
    <button class="shape-pill" data-shape="cat">🐱 Cat</button>
  </div>

  <div class="canvas-wrapper">
    <div class="canvas-label" id="canvasLabel">✨ Connect the dots to make a Star!</div>
    <div class="canvas-container" id="canvasContainer">
      <div class="canvas-spacer"></div>
      <canvas id="dotCanvas"></canvas>
    </div>
  </div>

  <div class="status-text" id="statusText">Tap dot number 1 to start! 👆</div>

  <div class="btn-row">
    <button class="btn btn-clear" onclick="resetPuzzle()">🔄 Restart</button>
    <button class="btn btn-next" onclick="pickRandomShape()">⏭️ New Shape</button>
  </div>
</div>

<div class="celebration" id="celebration">
  <div class="cel-box">
    <div class="cel-emoji">🎉</div>
    <div class="cel-title">You did it!</div>
    <div class="cel-msg" id="celMsg">Amazing dot-to-dot!</div>
    <button class="btn-again" onclick="closeCelebration()">Next Shape! 🌟</button>
  </div>
</div>

<script>
const canvas = document.getElementById('dotCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('canvasContainer');

let W, H;
let dots = [];
let lines = [];
let nextIndex = 0;
let currentShapeKey = 'star';

// Shape dot definitions (normalized 0-1)
const SHAPES = {
  star: {
    label:'⭐ Star',
    dots: [
      [0.5,0.1],[0.63,0.38],[0.93,0.38],[0.69,0.57],
      [0.79,0.87],[0.5,0.68],[0.21,0.87],[0.31,0.57],
      [0.07,0.38],[0.37,0.38]
    ]
  },
  house: {
    label:'🏠 House',
    dots:[
      [0.5,0.1],[0.85,0.42],[0.78,0.42],[0.78,0.87],
      [0.6,0.87],[0.6,0.66],[0.4,0.66],[0.4,0.87],
      [0.22,0.87],[0.22,0.42],[0.15,0.42]
    ]
  },
  fish: {
    label:'🐠 Fish',
    dots:[
      [0.15,0.3],[0.15,0.7],[0.3,0.78],[0.5,0.8],
      [0.7,0.72],[0.85,0.5],[0.7,0.28],[0.5,0.2],
      [0.3,0.22],[0.6,0.5],[0.15,0.3]
    ]
  },
  rocket: {
    label:'🚀 Rocket',
    dots:[
      [0.5,0.08],[0.68,0.3],[0.68,0.62],[0.8,0.75],
      [0.8,0.88],[0.63,0.78],[0.5,0.82],[0.37,0.78],
      [0.2,0.88],[0.2,0.75],[0.32,0.62],[0.32,0.3]
    ]
  },
  cat: {
    label:'🐱 Cat',
    dots:[
      [0.5,0.15],[0.72,0.12],[0.82,0.3],[0.72,0.38],
      [0.85,0.55],[0.72,0.72],[0.5,0.78],[0.28,0.72],
      [0.15,0.55],[0.28,0.38],[0.18,0.3],[0.28,0.12]
    ]
  }
};

function resize(){
  W=container.clientWidth;
  H=Math.round(W*0.75);
  canvas.width=W;canvas.height=H;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  buildDots();
  render();
}

function buildDots(){
  const shapeDef=SHAPES[currentShapeKey];
  dots=shapeDef.dots.map(([nx,ny],i)=>({
    x:nx*W, y:ny*H, num:i+1
  }));
  lines=[];nextIndex=0;
  updateInfo();
}

function updateInfo(){
  const next=nextIndex<dots.length?dots[nextIndex].num:'Done!';
  document.getElementById('nextDotInfo').innerHTML=nextIndex<dots.length?`Tap dot: <b>${next}</b>`:`<b>🎉 Finished!</b>`;
  document.getElementById('progressInfo').textContent=`${nextIndex} / ${dots.length} connected`;
}

function render(){
  ctx.clearRect(0,0,W,H);
  const R=Math.max(18,W*0.038);

  // Draw lines
  ctx.lineWidth=Math.max(4,W*0.009);
  ctx.lineCap='round';
  for(let i=0;i<lines.length;i++){
    const a=lines[i][0],b=lines[i][1];
    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.lineTo(b.x,b.y);
    ctx.strokeStyle='#5DADE2';
    ctx.stroke();
  }

  // Draw dots
  dots.forEach((d,i)=>{
    const connected=i<nextIndex;
    // Circle
    ctx.beginPath();
    ctx.arc(d.x,d.y,R,0,Math.PI*2);
    ctx.fillStyle=connected?'#5DADE2':'white';
    ctx.fill();
    ctx.strokeStyle=connected?'#2980B9':'#B0C4DE';
    ctx.lineWidth=Math.max(3,W*0.006);
    ctx.stroke();
    // Number
    ctx.fillStyle=connected?'white':'#5DADE2';
    ctx.font=`900 ${Math.max(12,W*0.032)}px Nunito`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(d.num,d.x,d.y);
  });

  // Highlight next dot
  if(nextIndex<dots.length){
    const nd=dots[nextIndex];
    ctx.beginPath();
    ctx.arc(nd.x,nd.y,R+6,0,Math.PI*2);
    ctx.strokeStyle='#FFD93D';
    ctx.lineWidth=4;
    ctx.setLineDash([8,5]);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

function getPos(e){
  const rect=canvas.getBoundingClientRect();
  const scaleX=W/rect.width, scaleY=H/rect.height;
  const src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-rect.left)*scaleX, y:(src.clientY-rect.top)*scaleY};
}

canvas.addEventListener('click',handleTap);
canvas.addEventListener('touchend',e=>{e.preventDefault();handleTap(e.changedTouches[0]);},{passive:false});

function handleTap(e){
  if(nextIndex>=dots.length)return;
  const pos=getPos(e);
  const R=Math.max(18,W*0.038)+8;
  const nd=dots[nextIndex];
  const dist=Math.hypot(pos.x-nd.x,pos.y-nd.y);
  if(dist<R*2.2){
    if(nextIndex>0) lines.push([dots[nextIndex-1],nd]);
    nextIndex++;
    updateInfo();
    render();
    const status=document.getElementById('statusText');
    if(nextIndex>=dots.length){
      status.textContent='🎉 You finished! Amazing!';
      setTimeout(()=>{celebrate();},400);
    }else{
      status.textContent=`Great! Now tap dot ${nextIndex+1}! 🌟`;
    }
  }else{
    // wrong tap - wiggle hint
    const status=document.getElementById('statusText');
    status.textContent=`Tap the glowing dot (number ${nextIndex+1})! 👆`;
  }
}

function celebrate(){
  document.getElementById('celMsg').textContent=`You connected all the dots to make a ${SHAPES[currentShapeKey].label}!`;
  document.getElementById('celebration').classList.add('show');
  confetti();
}

function closeCelebration(){
  document.getElementById('celebration').classList.remove('show');
  pickRandomShape();
}

function resetPuzzle(){
  buildDots();render();
  document.getElementById('statusText').textContent=`Tap dot number 1 to start! 👆`;
}

function pickRandomShape(){
  const keys=Object.keys(SHAPES).filter(k=>k!==currentShapeKey);
  currentShapeKey=keys[Math.floor(Math.random()*keys.length)];
  document.querySelectorAll('.shape-pill').forEach(b=>{
    b.classList.toggle('active',b.dataset.shape===currentShapeKey);
  });
  document.getElementById('canvasLabel').textContent=`✨ Connect the dots to make a ${SHAPES[currentShapeKey].label}!`;
  document.getElementById('statusText').textContent=`Tap dot number 1 to start! 👆`;
  buildDots();render();
}

document.getElementById('shapeRow').addEventListener('click',e=>{
  const btn=e.target.closest('.shape-pill');
  if(!btn)return;
  currentShapeKey=btn.dataset.shape;
  document.querySelectorAll('.shape-pill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('canvasLabel').textContent=`✨ Connect the dots to make a ${SHAPES[currentShapeKey].label}!`;
  document.getElementById('statusText').textContent=`Tap dot number 1 to start! 👆`;
  buildDots();render();
});

function confetti(){
  const colors=['#5DADE2','#9B59B6','#FFD93D','#2ECC71','#FF6B9D','#FF9F43'];
  for(let i=0;i<50;i++){
    setTimeout(()=>{
      const el=document.createElement('div');el.className='confetti-piece';
      el.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[~~(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*1.5}s;animation-delay:${Math.random()*0.5}s;transform:rotate(${Math.random()*360}deg)`;
      document.body.appendChild(el);setTimeout(()=>el.remove(),3500);
    },i*40);
  }
}

window.addEventListener('resize',resize);
resize();
</script>

</body>
</html>
