<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Count & Tap! 🔢</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;touch-action:manipulation;}
  body{font-family:'Nunito',sans-serif;background:#FFF5F0;min-height:100vh;}

header{
background:linear-gradient(135deg,#FF9F43,#FF6B9D);
padding:16px 20px 14px;text-align:center;
box-shadow:0 4px 20px rgba(255,159,67,0.35);
position:relative;
}
header h1{font-size:clamp(26px,7vw,42px);font-weight:900;color:white;text-shadow:3px 3px 0 rgba(0,0,0,0.1);}
header p{color:rgba(255,255,255,0.9);font-size:clamp(13px,3.5vw,16px);font-weight:700;margin-top:2px;}
.back-btn{position:absolute;top:14px;left:14px;background:rgba(255,255,255,0.25);border:none;border-radius:50px;padding:8px 16px;color:white;font-family:‘Nunito’,sans-serif;font-size:14px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block;}

.main{max-width:500px;margin:0 auto;padding:20px 16px;}

.score-bar{display:flex;justify-content:space-between;align-items:center;background:white;border-radius:20px;padding:12px 20px;margin-bottom:16px;box-shadow:0 4px 16px rgba(0,0,0,0.08);border:3px solid #FF9F43;}
.score-bar span{font-size:18px;font-weight:900;color:#8B4513;}

.progress-bar{background:#E0E0E0;border-radius:50px;height:14px;margin-bottom:20px;overflow:hidden;}
.progress-fill{background:linear-gradient(90deg,#FF9F43,#FF6B9D);height:100%;border-radius:50px;transition:width 0.4s ease;}

.question-box{
background:white;border-radius:28px;border:5px solid #FF9F43;
padding:20px 16px;text-align:center;margin-bottom:20px;
box-shadow:0 6px 24px rgba(0,0,0,0.08);
}
.question-label{font-size:16px;font-weight:800;color:#999;margin-bottom:14px;}

.emoji-grid{
display:flex;flex-wrap:wrap;justify-content:center;gap:8px;
min-height:80px;align-items:center;margin-bottom:14px;
}
.emoji-item{
font-size:clamp(28px,9vw,44px);line-height:1;
animation:popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

.question-text{font-size:clamp(18px,5vw,24px);font-weight:900;color:#FF6B9D;}

/* Answer options */
.answers-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
.ans-btn{
background:white;border:5px solid #FFE0CC;border-radius:24px;
padding:20px 10px;font-family:‘Nunito’,sans-serif;
font-size:clamp(32px,10vw,52px);font-weight:900;color:#FF6B9D;
cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,0.1);
transition:all 0.15s ease;
-webkit-tap-highlight-color:transparent;
display:flex;align-items:center;justify-content:center;gap:10px;
}
.ans-btn:active{transform:translateY(4px);box-shadow:0 1px 0 rgba(0,0,0,0.1);}
.ans-btn.correct{background:#2ECC71;border-color:#2ECC71;color:white;animation:correctBounce 0.5s ease;}
.ans-btn.wrong{background:#E74C3C;border-color:#E74C3C;color:white;animation:shake 0.4s ease;}
@keyframes correctBounce{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}

.feedback-text{text-align:center;font-size:clamp(20px,6vw,30px);font-weight:900;min-height:40px;margin-bottom:12px;}

/* End screen */
.end-screen{display:none;background:white;border-radius:28px;padding:36px 24px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.1);border:5px solid #FF9F43;}
.end-screen.show{display:block;}
.end-emoji{font-size:80px;margin-bottom:12px;}
.end-title{font-size:clamp(28px,8vw,40px);font-weight:900;color:#FF9F43;margin-bottom:8px;}
.end-score{font-size:22px;font-weight:800;color:#8B4513;margin-bottom:20px;}
.btn-restart{background:linear-gradient(135deg,#FF9F43,#FF6B9D);color:white;border:none;padding:16px 40px;border-radius:50px;font-family:‘Nunito’,sans-serif;font-size:20px;font-weight:900;cursor:pointer;box-shadow:0 5px 20px rgba(255,159,67,0.4);}

.confetti-piece{position:fixed;width:12px;height:12px;border-radius:2px;animation:fall 2.5s ease-in forwards;z-index:200;pointer-events:none;}
@keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
</style>

</head>
<body>
<header>
  <a href="index.html" class="back-btn">← Back</a>
  <h1>🔢 Count & Tap!</h1>
  <p>Count the things and tap the number!</p>
</header>

<div class="main">
  <div class="score-bar">
    <span>⭐ Score: <span id="scoreNum">0</span></span>
    <span>Round <span id="roundNum">1</span> / 8</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <div id="gameArea">
    <div class="question-box">
      <div class="question-label">How many are there? 🤔</div>
      <div class="emoji-grid" id="emojiGrid"></div>
      <div class="question-text" id="questionText"></div>
    </div>

```
<div class="feedback-text" id="feedbackText"></div>
<div class="answers-grid" id="answersGrid"></div>
```

  </div>

  <div class="end-screen" id="endScreen">
    <div class="end-emoji" id="endEmoji">🎉</div>
    <div class="end-title" id="endTitle">Amazing!</div>
    <div class="end-score" id="endScore"></div>
    <button class="btn-restart" onclick="startGame()">Play Again! 🔢</button>
  </div>
</div>

<script>
const EMOJIS = ['🐶','🐱','🐸','🦋','🌟','🍎','🌈','🎈','🐠','🌸','🍕','🦄','🌻','🎵','🐢','🍭'];
const ROUNDS = 8;
let score=0,round=0,locked=false;

function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5);}

function getRandInt(min,max){return Math.floor(Math.random()*(max-min+1))+min;}

function startGame(){
  score=0;round=0;locked=false;
  document.getElementById('endScreen').classList.remove('show');
  document.getElementById('gameArea').style.display='';
  document.getElementById('scoreNum').textContent=0;
  document.getElementById('feedbackText').textContent='';
  nextRound();
}

function nextRound(){
  if(round>=ROUNDS){endGame();return;}
  round++;
  locked=false;
  document.getElementById('roundNum').textContent=round;
  document.getElementById('progressFill').style.width=((round-1)/ROUNDS*100)+'%';
  document.getElementById('feedbackText').textContent='';

  const emoji = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
  const count = getRandInt(1,9);
  const emojiGrid = document.getElementById('emojiGrid');
  emojiGrid.innerHTML='';
  for(let i=0;i<count;i++){
    const span=document.createElement('span');
    span.className='emoji-item';
    span.textContent=emoji;
    span.style.animationDelay=(i*0.06)+'s';
    emojiGrid.appendChild(span);
  }
  document.getElementById('questionText').textContent=`How many ${emoji} do you see?`;

  // 4 answer choices
  let wrong = new Set();
  while(wrong.size<3){
    const n=getRandInt(1,10);
    if(n!==count) wrong.add(n);
  }
  const options = shuffle([count,...wrong]);
  const grid=document.getElementById('answersGrid');
  grid.innerHTML='';
  options.forEach(num=>{
    const btn=document.createElement('button');
    btn.className='ans-btn';
    btn.textContent=num;
    btn.addEventListener('click',()=>handleAnswer(btn,num===count,count));
    grid.appendChild(btn);
  });
}

function handleAnswer(btn,correct,correctAns){
  if(locked)return;
  locked=true;
  if(correct){
    btn.classList.add('correct');
    btn.textContent='✓ '+correctAns;
    score++;
    document.getElementById('scoreNum').textContent=score;
    document.getElementById('feedbackText').textContent='🎉 Correct! Amazing!';
    document.getElementById('feedbackText').style.color='#2ECC71';
  }else{
    btn.classList.add('wrong');
    document.getElementById('feedbackText').textContent='😊 Try again next time!';
    document.getElementById('feedbackText').style.color='#E74C3C';
    // show correct
    document.querySelectorAll('.ans-btn').forEach(b=>{
      if(parseInt(b.textContent)===correctAns){b.classList.add('correct');}
    });
  }
  setTimeout(nextRound,1200);
}

function endGame(){
  document.getElementById('gameArea').style.display='none';
  document.getElementById('progressFill').style.width='100%';
  const pct=Math.round(score/ROUNDS*100);
  let emoji,title;
  if(pct>=88){emoji='🏆';title='Counting Champ!';}
  else if(pct>=63){emoji='🌟';title='Great Counting!';}
  else if(pct>=38){emoji='😊';title='Good Try!';}
  else{emoji='💪';title='Keep Counting!';}
  document.getElementById('endEmoji').textContent=emoji;
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endScore').textContent=`You got ${score} out of ${ROUNDS}! (${pct}%)`;
  document.getElementById('endScreen').classList.add('show');
  if(pct>=63) confetti();
}

function confetti(){
  const colors=['#FF9F43','#FF6B9D','#FFD93D','#2ECC71','#3498DB','#9B59B6'];
  for(let i=0;i<50;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='confetti-piece';
      el.style.cssText=`left:${Math.random()*100}vw;top:-20px;background:${colors[~~(Math.random()*colors.length)]};animation-duration:${1.5+Math.random()*1.5}s;animation-delay:${Math.random()*0.5}s;transform:rotate(${Math.random()*360}deg)`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),3500);
    },i*40);
  }
}

startGame();
</script>

</body>
</html>
